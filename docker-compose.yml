services:
  router_a:
    build: .
    container_name: router_a
    privileged: true
    environment:
      MY_IP: 10.0.1.1
      NEIGHBORS: 10.0.1.2,10.0.3.2
      DIRECT_SUBNETS: 10.0.1.0/24,10.0.3.0/24
    networks:
      net_ab:
        ipv4_address: 10.0.1.1
      net_ac:
        ipv4_address: 10.0.3.1

  router_b:
    build: .
    container_name: router_b
    privileged: true
    environment:
      MY_IP: 10.0.1.2
      NEIGHBORS: 10.0.1.1,10.0.2.2
      DIRECT_SUBNETS: 10.0.1.0/24,10.0.2.0/24
    networks:
      net_ab:
        ipv4_address: 10.0.1.2
      net_bc:
        ipv4_address: 10.0.2.1

  router_c:
    build: .
    container_name: router_c
    privileged: true
    environment:
      MY_IP: 10.0.2.2
      NEIGHBORS: 10.0.2.1,10.0.3.1
      DIRECT_SUBNETS: 10.0.2.0/24,10.0.3.0/24
    networks:
      net_bc:
        ipv4_address: 10.0.2.2
      net_ac:
        ipv4_address: 10.0.3.2

networks:
  net_ab:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24
          gateway: 10.0.1.254

  net_bc:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.2.0/24
          gateway: 10.0.2.254

  net_ac:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.3.0/24
          gateway: 10.0.3.254
